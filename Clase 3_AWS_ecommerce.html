<style>

:root{
  --bg:#faf6fb;
  --ink:#453a56;
  --ink-soft:rgba(69,58,86,.62);
  --card:#fff;
  --lav:#d9c9f0;
  --lav-deep:#a98fd6;
  --mint:#bfe6d6;
  --mint-deep:#6fb99a;
  --peach:#f7d3c1;
  --peach-deep:#e39a76;
  --butter:#f6e6ad;
  --butter-deep:#d8b84a;
  --sky:#c7e0f0;
  --sky-deep:#7fb2d6;
  --line:rgba(69,58,86,.10);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'IBM Plex Mono',monospace;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:60px 20px 90px;
}

.wrap{
  width:100%;
  max-width:720px;
}

.hero{
  padding-bottom:36px;
  margin-bottom:44px;
  border-bottom:2px dashed var(--line);
}

.eyebrow{
  font-size:12px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--mint-deep);
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
  margin-bottom:16px;
}

.eyebrow::before{
  content:"";
  width:9px;
  height:9px;
  background:var(--mint-deep);
  border-radius:50%;
}

h1{
  font-family:'Fraunces',serif;
  font-size:clamp(36px,7vw,56px);
  margin:0 0 14px;
}

h1 em{
  font-style:italic;
  background:linear-gradient(180deg,transparent 62%,var(--lav) 62%);
}

.byline{
  font-size:13px;
  color:var(--ink-soft);
}

.byline a{
  color:var(--sky-deep);
  text-decoration:none;
  border-bottom:1px solid var(--sky-deep);
}

.byline a:hover{
  color:var(--lav-deep);
}

.section-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.15em;
  color:var(--ink-soft);
  margin-bottom:22px;
  font-weight:600;
}

.clases{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.clase{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px 22px;
  box-shadow:0 2px 0 var(--line);
}

.clase-title{
  display:flex;
  align-items:center;
  gap:10px;
  margin:0 0 12px;
  font-family:'Fraunces',serif;
  font-size:18px;
}

.clase-title a{
  color:inherit;
  text-decoration:none;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.clase:nth-child(1) .dot{
  background:var(--lav-deep);
}

.clase:nth-child(2) .dot{
  background:var(--sky-deep);
}

.clase:nth-child(3) .dot{
  background:var(--peach-deep);
}

.clase:nth-child(4) .dot{
  background:var(--mint-deep);
}

.clase:nth-child(5) .dot{
  background:var(--butter-deep);
}

.tareas{
  list-style:none;
  padding:0;
  margin:0;
}

.tareas li{
  margin:8px 0;
}

.tareas a{
  color:var(--ink-soft);
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}

.tareas a::before{
  content:"→";
  color:var(--mint-deep);
  font-weight:bold;
}

.tareas a:hover{
  color:var(--ink);
  text-decoration:underline;
}

.evidencia-img{
  width:100%;
  margin-top:14px;
  border-radius:12px;
  border:1px solid var(--line);
  display:block;
}

footer{
  margin-top:50px;
  padding-top:20px;
  border-top:2px dashed var(--line);
  color:var(--ink-soft);
  font-size:12px;
  text-align:center;
}

@media(max-width:560px){
  body{
    padding:40px 16px 70px;
  }
}

</style>
</head>
